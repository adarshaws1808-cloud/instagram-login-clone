<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
}

.login-box{
    background:#fff;
    border:1px solid #dbdbdb;
    padding:40px;
    text-align:center;
}

.login-box h1{
    font-size:40px;
    margin-bottom:30px;
    font-family:cursive;
}

form input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #dbdbdb;
    background:#fafafa;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#0095f6;
    color:white;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1877f2;
}

.divider{
    margin:20px 0;
    color:#8e8e8e;
    font-weight:bold;
}

.facebook-login{
    text-decoration:none;
    color:#385185;
    font-weight:bold;
    display:block;
    margin-bottom:15px;
}

.forgot-password{
    text-decoration:none;
    color:#00376b;
    font-size:12px;
}

.signup-box{
    background:#fff;
    border:1px solid #dbdbdb;
    margin-top:10px;
    padding:20px;
    text-align:center;
}

.signup-box a{
    text-decoration:none;
    color:#0095f6;
    font-weight:bold;
}

.logo{
    width:80px;
    height:80px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="container">
    <div class="login-box">
        <h1><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
     alt="Instagram Logo"
     class="logo"></h1>

        <form>
            <input type="text" placeholder="Phone number, username, or email">
            <input type="password" placeholder="Password">

            <button type="submit">Log In</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="#" class="facebook-login">Log in with Facebook</a>

        <a href="#" class="forgot-password">Forgot password?</a>
    </div>

    <div class="signup-box">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
</div>

</body>
</html>
